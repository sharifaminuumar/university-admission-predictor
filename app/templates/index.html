<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghanaian University Admission Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
        <h1>Ghanaian University Admission Predictor</h1>
        <p>Instantly match your WASSCE results against official university entry requirements.</p>
    </header>

    <div class="card">
        <form id="gradeForm">
            <h2>Core Subjects</h2>
            <div class="grid">
                <div class="form-group"><label>Core Mathematics</label><select id="Core Mathematics" required></select></div>
                <div class="form-group"><label>English Language</label><select id="English Language" required></select></div>
                <div class="form-group"><label>Integrated Science</label><select id="Integrated Science" required></select></div>
                <div class="form-group"><label>Social Studies</label><select id="Social Studies" required></select></div>
            </div>

            <h2>Elective Subjects</h2>
            <div id="electives-container">
                </div>

            <button type="submit" id="submitBtn">
                <span class="spinner" id="btnSpinner"></span>
                <span id="btnText">Analyze Eligibility</span>
            </button>
        </form>
    </div>

    <div class="card" id="results-container">
        <h2 style="border-bottom: none; margin-bottom: 12px;" id="match-count"></h2>
        <div id="results-list"></div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
